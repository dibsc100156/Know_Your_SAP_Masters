# secrets.yaml — Kubernetes Secrets for SAP Masters
# NOTE: In production, use SealedSecrets, Vault, or AWS Secrets Manager.
#       NEVER commit real credentials to version control.
#
# Create secrets from literal values:
#   kubectl create secret generic sap-masters-secrets \
#     -n sap-masters \
#     --from-literal=HANA_DB_USER=SYSTEM \
#     --from-literal=RABBITMQ_PASSWORD=sapmasters123 \
#     --from-literal=MINIO_ACCESS_KEY=sapmasters \
#     --from-literal=MINIO_SECRET_KEY=miniodemo123 \
#
# Or from file (for passwords):
#   kubectl create secret generic sap-masters-secrets \
#     -n sap-masters \
#     --from-file=HANA_DB_PASSWORD=./hana_password.txt \
#     --from-file=RABBITMQ_PASSWORD=./rabbitmq_password.txt

apiVersion: v1
kind: Secret
metadata:
  name: sap-masters-secrets
  namespace: sap-masters
  labels:
    app: sap-masters
type: Opaque
stringData:
  # SAP HANA credentials
  HANA_DB_USER: "SYSTEM"
  HANA_DB_PASSWORD: "CHANGE_ME"          # Override: --from-literal or Vault
  # RabbitMQ credentials
  RABBITMQ_PASSWORD: "sapmasters123"      # Override in prod
  # MinIO credentials
  MINIO_ACCESS_KEY: "sapmasters"
  MINIO_SECRET_KEY: "miniodemo123"         # Override in prod
