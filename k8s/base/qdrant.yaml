# qdrant.yaml — Qdrant Vector Database StatefulSet (Phase M6)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: qdrant
  namespace: sap-masters
  labels:
    app: qdrant
    app.kubernetes.io/name: sap-masters
    app.kubernetes.io/component: vector-store
spec:
  serviceName: qdrant-headless
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
        app.kubernetes.io/name: sap-masters
        app.kubernetes.io/component: vector-store
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6333"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: qdrant
          image: qdrant/qdrant:v1.7.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 6333
              name: http-rest
            - containerPort: 6334
              name: grpc
          env:
            - name: QDRANT__SERVICE__GRPC_PORT
              value: "6334"
            - name: QDRANT__SERVICE__MAX_REQUEST_SIZE_MB
              value: "32"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 2
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: 6333
            initialDelaySeconds: 5
            periodSeconds: 5
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: qdrant-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: sap-masters
  labels:
    app: qdrant
spec:
  type: ClusterIP
  ports:
    - name: http-rest
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
  selector:
    app: qdrant

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: sap-masters
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 50Gi
