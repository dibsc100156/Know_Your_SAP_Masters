# network-policy.yaml — NetworkPolicies (Calico / Cilium CNI required)
# =============================================================================
# Restricts network traffic between pods following least-privilege.
# NOTE: Requires a CNI that supports NetworkPolicy (Calico, Cilium, Weave Net).
#
# Default deny all:
#   kubectl apply -f k8s/base/network-policy.yaml
#
# Inspect applied policies:
#   kubectl get networkpolicy -n sap-masters
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: sap-masters
spec:
  # Empty podSelector = all pods in namespace
  podSelector: {}
  # No ingress/egress rules = deny all traffic
  policyTypes:
    - Ingress
    - Egress

---
# Allow backend → data layer (Memgraph, Qdrant, Redis, RabbitMQ)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-to-data-layer
  namespace: sap-masters
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Egress
  egress:
    # Memgraph
    - to:
        - podSelector:
            matchLabels:
              app: memgraph
      ports:
        - protocol: TCP
          port: 7687
        - protocol: TCP
          port: 7444
    # Qdrant
    - to:
        - podSelector:
            matchLabels:
              app: qdrant
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    # RabbitMQ
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
        - protocol: TCP
          port: 15672
    # MinIO
    - to:
        - podSelector:
            matchLabels:
              app: minio
      ports:
        - protocol: TCP
          port: 9000
        - protocol: TCP
          port: 9001
    # DNS (required for service discovery)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow celery → data layer
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-celery-to-data-layer
  namespace: sap-masters
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: celery-agent
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: memgraph
      ports:
        - protocol: TCP
          port: 7687
    - to:
        - podSelector:
            matchLabels:
              app: qdrant
      ports:
        - protocol: TCP
          port: 6333
        - protocol: TCP
          port: 6334
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: rabbitmq
      ports:
        - protocol: TCP
          port: 5672
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53

---
# Allow ingress for backend (from Ingress controller / outside world)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-backend-ingress
  namespace: sap-masters
spec:
  podSelector:
    matchLabels:
      app: backend
  ingress:
    # NGINX Ingress Controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
    # Prometheus (metrics scraping)
    - from:
        - namespaceSelector:
            matchLabels:
              prometheus: kube-prometheus
      ports:
        - protocol: TCP
          port: 8000

---
# Allow Flower ingress (monitoring UI)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-flower-ingress
  namespace: sap-masters
spec:
  podSelector:
    matchLabels:
      app: flower
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 5555
